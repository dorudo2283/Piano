<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>曲選択 - リズムWebピアノ</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; margin: 0; }
        h1 { color: #00d2ff; }
        .song-list { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; width: 350px; }
        
        /* すべてのボタンを共通のデザインに統一 */
        .song-btn {
            padding: 15px; font-size: 18px; font-weight: bold; background: #333; color: white;
            border: 2px solid #555; border-radius: 8px; cursor: pointer; transition: all 0.2s;
            text-align: left; display: flex; flex-direction: column;
            text-decoration: none; box-sizing: border-box;
        }
        .song-btn span { font-size: 12px; color: #aaa; font-weight: normal; margin-top: 4px; }
        .song-btn:hover { background: #00d2ff; color: #1a1a1a; border-color: #00d2ff; transform: translateY(-2px); }
        .free-btn { background: #444; border-color: #666; }
    </style>
</head>
<body>

    <h1>🎵 演奏モード・曲を選んでください</h1>

    <div class="song-list">
        <button class="song-btn free-btn" onclick="selectSong('free')">
            🎹 自由演奏（フリーモード）
            <span>ノーツは落ちてきません。自由に鍵盤を叩けます。</span>
        </button>
        
        <button class="song-btn" onclick="selectSong('twinkle')">
            ⭐ きらきら星（フル演奏版）
            <span>初心者はまずこれを覚えるべき！</span>
        </button>
        
        <button class="song-btn" onclick="selectSong('garibu')">
            🏝️ ガリブの島
            <span>練習頑張れｗ</span>
        </button>

        <button class="song-btn" onclick="selectSong('murakumo')">
            🌙 月に叢雲華に風（サビ）
            <span>東方の超人気神曲！黒鍵をフル活用する。</span>
        </button>
    </div>

    <script>
        function selectSong(songId) {
            window.location.href = `index.html?song=${songId}`;
        }
    </script>
</body>
</html>
