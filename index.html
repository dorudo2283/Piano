<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>演奏画面 - リズムWebピアノ</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        
        .header-area { margin: 15px; display: flex; gap: 20px; align-items: center; z-index: 10; }
        .back-btn { padding: 8px 15px; background: #555; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .start-btn { padding: 10px 20px; font-size: 16px; background: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .start-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* ゲーム画面（幅を少し調整して線の位置と合わせやすくしています） */
        .game-view { position: relative; width: 480px; height: 500px; background: #222; border: 3px solid #444; border-bottom: none; overflow: hidden; }

        /* 【新機能】レーンを区切る縦のガイド線 */
        .lane-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; pointer-events: none; }
        .line { flex: 1; border-right: 1px dashed rgba(255, 255, 255, 0.15); height: 100%; }
        .line:last-child { border-right: none; } /* 一番右の線は消す */

        /* 落ちてくるノーツ */
        .note-block {
            position: absolute; width: 56px; height: 25px;
            background: linear-gradient(#00d2ff, #0066ff);
            border-radius: 4px; box-shadow: 0 0 8px #00d2ff;
            animation: fall 2.5s linear forwards; z-index: 2;
        }

        /* 判定ライン */
        .judgment-line { position: absolute; bottom: 120px; width: 100%; height: 3px; background: #ff0055; box-shadow: 0 0 10px #ff0055; z-index: 3; }

        /* ピアノ鍵盤エリア */
        .piano-container { display: flex; background: #333; padding: 5px 10px; width: 460px; height: 110px; position: absolute; bottom: 0; z-index: 4; }
        .white-key {
            flex: 1; height: 100%; background: white; color: #333; cursor: pointer; border: 1px solid #333; border-top: none; border-radius: 0 0 4px 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 10px; font-weight: bold; user-select: none; box-shadow: inset 0 -5px 0 #ccc; box-sizing: border-box;
        }
        .white-key.active, .white-key:active { background: #00d2ff; color: white; box-shadow: none; transform: scaleY(0.96); transform-origin: top; }
        .key-hint { font-size: 11px; color: #888; }

        @keyframes fall {
            0% { top: -30px; }
            100% { top: 500px; }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <a href="music.html" class="back-btn">⬅ 曲選択へ戻る</a>
        <h2 id="song-title">曲を読み込み中...</h2>
        <button id="start-btn" class="start-btn">演奏スタート！</button>
    </div>

    <div class="game-view" id="game-view">
        <div class="lane-lines">
            <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
            <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
        </div>
        
        <div class="judgment-line"></div>
        
        <div class="piano-container">
            <div class="white-key" id="key-A" data-note="261.63"><span>ド</span><span class="key-hint">[A]</span></div>
            <div class="white-key" id="key-S" data-note="293.66"><span>レ</span><span class="key-hint">[S]</span></div>
            <div class="white-key" id="key-D" data-note="329.63"><span>ミ</span><span class="key-hint">[D]</span></div>
            <div class="white-key" id="key-F" data-note="349.23"><span>ファ</span><span class="key-hint">[F]</span></div>
            <div class="white-key" id="key-G" data-note="392.00"><span>ソ</span><span class="key-hint">[G]</span></div>
            <div class="white-key" id="key-H" data-note="440.00"><span>ラ</span><span class="key-hint">[H]</span></div>
            <div class="white-key" id="key-J" data-note="493.88"><span>シ</span><span class="key-hint">[J]</span></div>
            <div class="white-key" id="key-K" data-note="523.25"><span>ド↑</span><span class="key-hint">[K]</span></div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gameView = document.getElementById('game-view');
        const startBtn = document.getElementById('start-btn');
        const songTitleEl = document.getElementById('song-title');

        // 各鍵盤の左端からの位置（px）
        const keyPositions = { 'key-A': 10, 'key-S': 67, 'key-D': 124, 'key-F': 181, 'key-G': 238, 'key-H': 295, 'key-J': 352, 'key-K': 409 };

        // 🎵 【曲データのデータベース】音楽ファイルに分ける代わりに、ここで管理
        const songs = {
            twinkle: {
                title: "⭐ きらきら星",
                data: [
                    ['key-A', 0.0], ['key-A', 1.0], ['key-G', 2.0], ['key-G', 3.0],
                    ['key-H', 4.0], ['key-H', 5.0], ['key-G', 6.0],
                    ['key-F', 8.0], ['key-F', 9.0], ['key-D', 10.0], ['key-D', 11.0],
                    ['key-S', 12.0], ['key-S', 13.0], ['key-A', 14.0]
                ]
            },
            custom: {
                title: "🎹 カスタム テスト曲",
                data: [
                    ['key-A', 0.0], ['key-D', 0.5], ['key-G', 1.0], ['key-K', 1.5],
                    ['key-K', 2.5], ['key-G', 3.0], ['key-D', 3.5], ['key-A', 4.0]
                ]
            }
        };

        // URLからどの曲が選ばれたか（パラメータ）を解析する
        const urlParams = new URLSearchParams(window.location.search);
        const currentSongId = urlParams.get('song') || 'twinkle'; // 指定がなければきらきら星
        const currentSong = songs[currentSongId];

        // 画面に曲名を表示
        songTitleEl.textContent = currentSong ? currentSong.title : "曲が見つかりません";

        // 1. 鍵盤操作の処理（前回同様）
        const pressedKeys = {};
        function handleKeyDown(keyId) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const targetKey = document.getElementById(keyId);
            if (targetKey) {
                targetKey.classList.add('active');
                playTone(parseFloat(targetKey.getAttribute('data-note')));
            }
        }
        function handleKeyUp(keyId) {
            const targetKey = document.getElementById(keyId);
            if (targetKey) targetKey.classList.remove('active');
        }

        window.addEventListener('keydown', (e) => {
            const keyId = `key-${e.key.toUpperCase()}`;
            if (pressedKeys[e.key.toUpperCase()] || !keyPositions[keyId]) return;
            pressedKeys[e.key.toUpperCase()] = true;
            handleKeyDown(keyId);
        });
        window.addEventListener('keyup', (e) => {
            pressedKeys[e.key.toUpperCase()] = false;
            handleKeyUp(`key-${e.key.toUpperCase()}`);
        });

        document.querySelectorAll('.white-key').forEach(key => {
            key.addEventListener('mousedown', () => handleKeyDown(key.id));
            key.addEventListener('mouseup', () => handleKeyUp(key.id));
            key.addEventListener('mouseleave', () => handleKeyUp(key.id));
        });

        // 2. ゲーム開始処理
        startBtn.addEventListener('click', () => {
            if (!currentSong) return;
            startBtn.disabled = true;
            
            currentSong.data.forEach(([keyId, delay]) => {
                setTimeout(() => { createNoteBlock(keyId); }, delay * 1000);
            });

            setTimeout(() => { startBtn.disabled = false; }, 18000);
        });

        function createNoteBlock(keyId) {
            const block = document.createElement('div');
            block.classList.add('note-block');
            block.style.left = `${keyPositions[keyId]}px`;
            gameView.appendChild(block);
            block.addEventListener('animationend', () => { block.remove(); });
        }

        function playTone(frequency) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'triangle';
            oscillator.frequency.value = frequency;
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0.8, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(now);
            oscillator.stop(now + 0.8);
        }
    </script>
</body>
</html>
