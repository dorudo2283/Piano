<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>演奏画面 - リズムWebピアノ</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        
        .header-area { margin: 15px; display: flex; gap: 20px; align-items: center; z-index: 10; height: 50px; }
        .menu-btn { padding: 8px 15px; background: #555; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; }
        .menu-btn:hover { background: #777; }
        .start-btn { padding: 10px 20px; font-size: 16px; background: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .start-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* ゲーム画面（外枠のサイズ計算を厳密に：内寸456px） */
        .game-view { position: relative; width: 456px; height: 500px; background: #222; border: 3px solid #444; border-bottom: none; overflow: hidden; }

        /* レーンを区切る縦のガイド線（8分割） */
        .lane-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; pointer-events: none; z-index: 1; }
        .line { flex: 1; border-right: 1px dashed rgba(255, 255, 255, 0.15); height: 100%; box-sizing: border-box; }
        .line:last-child { border-right: none; }

        /* 落ちてくるノーツ（鍵盤幅57pxと完全に一致、枠線を考慮して55pxに調整） */
        .note-block {
            position: absolute; width: 55px; height: 30px;
            background: linear-gradient(#00d2ff, #0066ff);
            border-radius: 4px; box-shadow: 0 0 8px #00d2ff;
            animation: fall 2.5s linear forwards; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: white; box-sizing: border-box;
        }

        /* 判定ライン */
        .judgment-line { position: absolute; bottom: 120px; width: 100%; height: 3px; background: #ff0055; box-shadow: 0 0 10px #ff0055; z-index: 3; }

        /* ピアノ鍵盤エリア */
        .piano-container { display: flex; background: #333; width: 456px; height: 120px; position: absolute; bottom: 0; z-index: 4; box-sizing: border-box; }
        .white-key {
            width: 57px; height: 100%; background: white; color: #333; cursor: pointer; border: 1px solid #333; border-top: none; border-radius: 0 0 4px 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 10px; font-weight: bold; user-select: none; box-shadow: inset 0 -5px 0 #ccc; box-sizing: border-box;
        }
        .white-key.active, .white-key:active { background: #00d2ff; color: white; box-shadow: none; transform: scaleY(0.96); transform-origin: top; }
        .key-hint { font-size: 11px; color: #888; }

        @keyframes fall {
            0% { top: -35px; }
            100% { top: 500px; }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <a href="music.html" class="menu-btn">🎵 曲設定を開く</a>
        <h2 id="song-title">自由演奏（フリーモード）</h2>
        <button id="start-btn" class="start-btn">演奏スタート！ (Enter)</button>
    </div>

    <div class="game-view" id="game-view">
        <div class="lane-lines">
            <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
            <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
        </div>
        
        <div class="judgment-line"></div>
        
        <div class="piano-container">
            <div class="white-key" id="key-A" data-note="261.63" data-name="ド"><span>ド</span><span class="key-hint">[A]</span></div>
            <div class="white-key" id="key-S" data-note="293.66" data-name="レ"><span>レ</span><span class="key-hint">[S]</span></div>
            <div class="white-key" id="key-D" data-note="329.63" data-name="ミ"><span>ミ</span><span class="key-hint">[D]</span></div>
            <div class="white-key" id="key-F" data-note="349.23" data-name="ファ"><span>ファ</span><span class="key-hint">[F]</span></div>
            <div class="white-key" id="key-G" data-note="392.00" data-name="ソ"><span>ソ</span><span class="key-hint">[G]</span></div>
            <div class="white-key" id="key-H" data-note="440.00" data-name="ラ"><span>ラ</span><span class="key-hint">[H]</span></div>
            <div class="white-key" id="key-J" data-note="493.88" data-name="シ"><span>シ</span><span class="key-hint">[J]</span></div>
            <div class="white-key" id="key-K" data-note="523.25" data-name="ド↑"><span>ド↑</span><span class="key-hint">[K]</span></div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gameView = document.getElementById('game-view');
        const startBtn = document.getElementById('start-btn');
        const songTitleEl = document.getElementById('song-title');

        // 幅57pxの鍵盤にノーツの位置（left）を1pxの狂いもなく完全同期させる計算
        const keyIds = ['key-A', 'key-S', 'key-D', 'key-F', 'key-G', 'key-H', 'key-J', 'key-K'];
        const keyPositions = {};
        keyIds.forEach((id, index) => {
            keyPositions[id] = index * 57 + 1; // 完全にラインの内側へ収める
        });

        // 🎶 【拡張された曲データベース】
        const songs = {
            free: { title: "自由演奏（フリーモード）", data: [] },
            twinkle: {
                title: "⭐ きらきら星 (フル演奏)",
                // [鍵盤ID, 降らせるタイミング(秒)]：24音すべて網羅
                data: [
                    ['key-A', 0.0], ['key-A', 0.7], ['key-G', 1.4], ['key-G', 2.1], ['key-H', 2.8], ['key-H', 3.5], ['key-G', 4.2], // ドドソソララソ
                    ['key-F', 5.6], ['key-F', 6.3], ['key-D', 7.0], ['key-D', 7.7], ['key-S', 8.4], ['key-S', 9.1], ['key-A', 9.8], // ファファミミレレド
                    ['key-G', 11.2], ['key-G', 11.9], ['key-F', 12.6], ['key-F', 13.3], ['key-D', 14.0], ['key-D', 14.7], ['key-S', 15.4], // ソソファファミミレ
                    ['key-G', 16.8], ['key-G', 17.5], ['key-F', 18.2], ['key-F', 18.9], ['key-D', 19.6], ['key-D', 20.3], ['key-S', 21.0], // ソソファファミミレ
                    ['key-A', 22.4], ['key-A', 23.1], ['key-G', 24.1], ['key-G', 24.8], ['key-H', 25.5], ['key-H', 26.2], ['key-G', 26.9], // ドドソソララソ
                    ['key-F', 28.3], ['key-F', 29.0], ['key-D', 29.7], ['key-D', 30.4], ['key-S', 31.1], ['key-S', 31.8], ['key-A', 32.5]  // ファファミミレレド
                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const currentSongId = urlParams.get('song') || 'free'; 
        const currentSong = songs[currentSongId];

        songTitleEl.textContent = currentSong ? currentSong.title : "自由演奏（フリーモード）";
        
        // 🛠️ 【修正】自由演奏モードならスタートボタン自体を画面から消す（認知的負荷の低減）
        if (currentSongId === 'free' || !currentSong || currentSong.data.length === 0) {
            startBtn.style.display = 'none';
        }

        let activeNotes = [];

        // キーボード＆マウスイベント
        const pressedKeys = {};
        function handleKeyDown(keyId) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const targetKey = document.getElementById(keyId);
            if (!targetKey) return;

            targetKey.classList.add('active');

            if (currentSongId !== 'free') {
                const matchingNoteIndex = activeNotes.findIndex(n => n.keyId === keyId);
                
                if (matchingNoteIndex !== -1) {
                    const noteObj = activeNotes[matchingNoteIndex];
                    const rect = noteObj.element.getBoundingClientRect();
                    const viewRect = gameView.getBoundingClientRect();
                    const noteTopInsideView = rect.top - viewRect.top;

                    // 判定窓（ピンクの線の前後）
                    if (noteTopInsideView >= 310 && noteTopInsideView <= 380) {
                        playHitSound(); 
                        playTone(parseFloat(targetKey.getAttribute('data-note'))); 
                        noteObj.element.remove(); 
                        activeNotes.splice(matchingNoteIndex, 1);
                        return;
                    }
                }
                playMissSound(); 
            } else {
                playTone(parseFloat(targetKey.getAttribute('data-note')));
            }
        }

        function handleKeyUp(keyId) {
            const targetKey = document.getElementById(keyId);
            if (targetKey) targetKey.classList.remove('active');
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && currentSongId !== 'free' && !startBtn.disabled) {
                startPlaying();
                return;
            }
            const keyId = `key-${e.key.toUpperCase()}`;
            if (pressedKeys[e.key.toUpperCase()] || !keyPositions[keyId]) return;
            pressedKeys[e.key.toUpperCase()] = true;
            handleKeyDown(keyId);
        });
        
        window.addEventListener('keyup', (e) => {
            pressedKeys[e.key.toUpperCase()] = false;
            handleKeyUp(`key-${e.key.toUpperCase()}`);
        });

        document.querySelectorAll('.white-key').forEach(key => {
            key.addEventListener('mousedown', () => handleKeyDown(key.id));
            key.addEventListener('mouseup', () => handleKeyUp(key.id));
            key.addEventListener('mouseleave', () => handleKeyUp(key.id));
        });

        // 2. ゲーム開始・終了処理
        startBtn.addEventListener('click', startPlaying);

        function startPlaying() {
            if (!currentSong || currentSong.data.length === 0) return;
            startBtn.disabled = true;
            startBtn.textContent = "演奏中...";
            
            currentSong.data.forEach(([keyId, delay]) => {
                setTimeout(() => { createNoteBlock(keyId); }, delay * 1000);
            });

            // 🛠️ 【修正】最後の音が降ってきて、画面外に消え去るタイミングを計算してボタンを復活させる
            const lastNote = currentSong.data[currentSong.data.length - 1];
            const totalGameTime = (lastNote[1] + 2.5) * 1000; // 最後の音の発生1秒後＋アニメーション時間2.5秒

            setTimeout(() => {
                startBtn.disabled = false;
                startBtn.textContent = "演奏スタート！ (Enter)";
            }, totalGameTime);
        }

        function createNoteBlock(keyId) {
            const block = document.createElement('div');
            block.createElement
            block.classList.add('note-block');
            block.style.left = `${keyPositions[keyId]}px`;
            
            const keyEl = document.getElementById(keyId);
            block.textContent = keyEl ? keyEl.getAttribute('data-name') : "";

            gameView.appendChild(block);

            const noteObj = { keyId: keyId, element: block };
            activeNotes.push(noteObj);

            block.addEventListener('animationend', () => {
                block.remove();
                activeNotes = activeNotes.filter(n => n !== noteObj);
            });
        }

        // 音声合成エンジン（前回同様）
        function playTone(frequency) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'triangle';
            oscillator.frequency.value = frequency;
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0.8, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(now);
            oscillator.stop(now + 0.8);
        }

        function playHitSound() {
            const bufferSize = audioCtx.sampleRate * 0.04;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 1500;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function playMissSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.value = 110;
            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.15);
        }
    </script>
</body>
</html>
