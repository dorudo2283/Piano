<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>演奏画面 - リズムWebピアノ</title>
    <style>
        /* 画面全体をぴったり100%にフィットさせ、スクロールを完全排除 */
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; }
        
        /* スコア・ゲージエリア（高さを固定して安定化） */
        .header-area { height: 75px; margin: 5px 0 0 0; display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 10; width: 100%; max-width: 456px; box-sizing: border-box; }
        .nav-row { display: flex; width: 100%; justify-content: space-between; align-items: center; padding: 0 10px; box-sizing: border-box; }
        .menu-btn { padding: 5px 10px; background: #555; color: white; border: none; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: bold; }
        .start-btn { padding: 6px 14px; font-size: 13px; background: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .start-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .status-row { display: flex; width: 100%; justify-content: space-between; padding: 0 10px; font-size: 13px; font-weight: bold; color: #00d2ff; }
        .progress-container { width: calc(100% - 20px); height: 5px; background: #333; border-radius: 3px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #0066ff); transition: width 0.1s linear; }

        /* ゲーム画面（余った縦幅をすべて自動で使い切る：flex: 1） */
        .game-view { position: relative; width: 100%; max-width: 456px; flex: 1; background: #222; border: 3px solid #444; border-bottom: none; overflow: hidden; box-sizing: border-box; }

        /* レーンガイド線 */
        .lane-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; pointer-events: none; z-index: 1; }
        .line { flex: 1; border-right: 1px dashed rgba(255, 255, 255, 0.12); height: 100%; box-sizing: border-box; }
        .line:last-child { border-right: none; }

        /* ノーツデザイン */
        .note-block {
            position: absolute; height: 18px;
            background: linear-gradient(#00d2ff, #0066ff);
            border-radius: 4px; box-shadow: 0 0 8px #00d2ff;
            animation: fall 2.5s linear forwards; z-index: 2;
            box-sizing: border-box;
        }
        .note-block.black-note {
            background: linear-gradient(#ff00d2, #aa00ff);
            box-shadow: 0 0 8px #ff00d2;
        }

        /* 判定テキスト表示位置 */
        .judgment-display { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 26px; font-weight: bold; text-shadow: 0 0 10px black; pointer-events: none; z-index: 5; text-align: center; }
        .judgment-text.perfect { color: #ffea00; }
        .judgment-text.great { color: #00ff66; }
        .judgment-text.miss { color: #ff0055; }
        .combo-text { font-size: 15px; color: white; margin-top: 2px; }

        /* 判定ライン（底面から15px上に固定） */
        .judgment-line { position: absolute; bottom: 15px; width: 100%; height: 4px; background: #ff0055; box-shadow: 0 0 10px #ff0055; z-index: 3; }

        /* ピアノ鍵盤エリア（高さを130pxから85pxにコンパクト化！） */
        .piano-container { display: flex; background: #333; width: 100%; max-width: 456px; height: 85px; position: relative; z-index: 4; box-sizing: border-box; }
        
        /* 白鍵 */
        .white-key {
            flex: 1; height: 100%; background: white; color: #333; border: 1px solid #333; border-top: none; border-radius: 0 0 4px 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 6px; font-weight: bold; font-size: 11px; box-shadow: inset 0 -4px 0 #ccc; box-sizing: border-box;
            touch-action: none; z-index: 1;
        }
        .white-key.active { background: #00d2ff; color: white; box-shadow: none; transform: scaleY(0.96); transform-origin: top; }
        
        /* 黒鍵（白鍵の縮小に合わせてこちらもバランスを最適化） */
        .black-key {
            position: absolute; width: calc(12.5% * 0.65); height: 58%; background: #111; color: white;
            border-radius: 0 0 3px 3px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 4px; font-size: 9px; border: 1px solid #000; box-shadow: inset 0 -3px 0 #444; box-sizing: border-box;
            touch-action: none; z-index: 2;
        }
        .black-key.active { background: #ff00d2; color: white; box-shadow: none; transform: scaleY(0.96); transform-origin: top; }

        /* 黒鍵の配置位置 */
        #key-W { left: calc(12.5% * 1 - (12.5% * 0.65) / 2); }
        #key-E { left: calc(12.5% * 2 - (12.5% * 0.65) / 2); }
        #key-T { left: calc(12.5% * 4 - (12.5% * 0.65) / 2); }
        #key-Y { left: calc(12.5% * 5 - (12.5% * 0.65) / 2); }
        #key-U { left: calc(12.5% * 6 - (12.5% * 0.65) / 2); }

        .key-hint { font-size: 8px; color: #888; margin-top: 1px; }
        .black-key .key-hint { color: #aaa; }

        @keyframes fall {
            0% { top: -25px; }
            100% { top: calc(100% - 15px); } /* 判定線の位置変更に合わせて終点を調整 */
        }
    </style>
</head>
<body>

    <div class="header-area">
        <div class="nav-row">
            <a href="music.html" class="menu-btn">🎵 曲選択へ</a>
            <h2 id="song-title" style="margin:0; font-size: 16px;">自由演奏</h2>
            <button id="start-btn" class="start-btn">スタート</button>
        </div>
        <div class="status-row">
            <div id="score-display">SCORE: 0</div>
            <div id="combo-display" style="opacity: 0;">0 COMBO</div>
        </div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <div class="game-view" id="game-view">
        <div class="lane-lines">
            <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
            <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
        </div>
        <div class="judgment-display" id="judgment-display"></div>
        <div class="judgment-line"></div>
    </div>
    
    <div class="piano-container">
        <div class="white-key" id="key-A" data-is-black="false" data-index="0" data-note="261.63" data-name="ド"><span>ド</span><span class="key-hint">[A]</span></div>
        <div class="white-key" id="key-S" data-is-black="false" data-index="1" data-note="293.66" data-name="レ"><span>レ</span><span class="key-hint">[S]</span></div>
        <div class="white-key" id="key-D" data-is-black="false" data-index="2" data-note="329.63" data-name="ミ"><span>ミ</span><span class="key-hint">[D]</span></div>
        <div class="white-key" id="key-F" data-is-black="false" data-index="3" data-note="349.23" data-name="ファ"><span>ファ</span><span class="key-hint">[F]</span></div>
        <div class="white-key" id="key-G" data-is-black="false" data-index="4" data-note="392.00" data-name="ソ"><span>ソ</span><span class="key-hint">[G]</span></div>
        <div class="white-key" id="key-H" data-is-black="false" data-index="5" data-note="440.00" data-name="ラ"><span>ラ</span><span class="key-hint">[H]</span></div>
        <div class="white-key" id="key-J" data-is-black="false" data-index="6" data-note="493.88" data-name="シ"><span>シ</span><span class="key-hint">[J]</span></div>
        <div class="white-key" id="key-K" data-is-black="false" data-index="7" data-note="523.25" data-name="ド↑"><span>ド↑</span><span class="key-hint">[K]</span></div>

        <div class="black-key" id="key-W" data-is-black="true" data-index="0.5" data-note="277.18" data-name="ド#"><span>ド#</span><span class="key-hint">[W]</span></div>
        <div class="black-key" id="key-E" data-is-black="true" data-index="1.5" data-note="311.13" data-name="レ#"><span>レ#</span><span class="key-hint">[E]</span></div>
        <div class="black-key" id="key-T" data-is-black="true" data-index="3.5" data-note="369.99" data-name="ファ#"><span>ファ#</span><span class="key-hint">[T]</span></div>
        <div class="black-key" id="key-Y" data-is-black="true" data-index="4.5" data-note="415.30" data-name="ソ#"><span>ソ#</span><span class="key-hint">[Y]</span></div>
        <div class="black-key" id="key-U" data-is-black="true" data-index="5.5" data-note="466.16" data-name="ラ#"><span>ラ#</span><span class="key-hint">[U]</span></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gameView = document.getElementById('game-view');
        const startBtn = document.getElementById('start-btn');
        const songTitleEl = document.getElementById('song-title');
        const scoreDisplay = document.getElementById('score-display');
        const comboDisplay = document.getElementById('combo-display');
        const progressBar = document.getElementById('progress-bar');
        const judgmentDisplay = document.getElementById('judgment-display');

        const allKeyIds = ['key-A','key-S','key-D','key-F','key-G','key-H','key-J','key-K','key-W','key-E','key-T','key-Y','key-U'];

        let score = 0;
        let combo = 0;
        let activeNotes = [];
        let progressInterval = null;

        const songs = {
            free: { title: "自由演奏（フリーモード）", data: [] },
            twinkle: {
                title: "⭐ きらきら星",
                data: [
                    ['key-A', 0.0], ['key-A', 0.7], ['key-G', 1.4], ['key-G', 2.1], ['key-H', 2.8], ['key-H', 3.5], ['key-G', 4.2],
                    ['key-F', 5.6], ['key-F', 6.3], ['key-D', 7.0], ['key-D', 7.7], ['key-S', 8.4], ['key-S', 9.1], ['key-A', 9.8]
                ]
            },
            garibu: {
                title: "🏝️ ガリブの島",
                data: [
                    ['key-D', 0.0], ['key-F', 0.5], ['key-G', 1.0], ['key-H', 1.5],
                    ['key-H', 2.0], ['key-G', 2.5], ['key-F', 3.0], ['key-D', 3.5],
                    ['key-T', 19.0], ['key-G', 19.5], ['key-H', 20.0], ['key-J', 20.5]
                ]
            },
            rushe: {
                title: "🎹 Rush E (本家再現ドラマチック版)",
                data: [
                    ['key-A', 0.0], ['key-A', 0.5], ['key-A', 1.0], ['key-A', 1.5],
                    ['key-A', 2.0], ['key-D', 2.3], ['key-G', 2.6], ['key-A', 3.0],
                    ['key-A', 4.0], ['key-A', 4.5], ['key-A', 5.0], ['key-A', 5.5],
                    ['key-A', 6.0], ['key-F', 6.3], ['key-D', 6.6], ['key-A', 7.0],
                    ['key-A', 8.0], ['key-S', 8.3], ['key-D', 8.6], ['key-F', 8.9],
                    ['key-G', 9.2], ['key-H', 9.5], ['key-J', 9.8], ['key-K', 10.1],
                    ['key-A', 11.0], ['key-A', 11.15], ['key-A', 11.3], ['key-A', 11.45],
                    ['key-A', 11.6], ['key-A', 11.75], ['key-A', 11.9], ['key-A', 12.05],
                    ['key-A', 12.3], ['key-S', 12.5], ['key-A', 12.7], ['key-D', 12.9],
                    ['key-A', 13.1], ['key-F', 13.3], ['key-A', 13.5], ['key-G', 13.7],
                    ['key-A', 14.0], ['key-A', 14.12], ['key-A', 14.24], ['key-A', 14.36],
                    ['key-A', 14.48], ['key-A', 14.6], ['key-A', 14.72], ['key-A', 14.84],
                    ['key-W', 15.2], ['key-A', 15.4], ['key-E', 15.6], ['key-A', 15.8],
                    ['key-T', 16.0], ['key-A', 16.2], ['key-Y', 16.4], ['key-A', 16.6],
                    ['key-A', 17.0], ['key-D', 17.1], ['key-G', 17.2], ['key-K', 17.3], ['key-K', 17.8]
                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const currentSongId = urlParams.get('song') || 'free'; 
        const currentSong = songs[currentSongId];

        songTitleEl.textContent = currentSong ? currentSong.title : "自由演奏（フリーモード）";
        if (currentSongId === 'free' || !currentSong || currentSong.data.length === 0) {
            startBtn.style.display = 'none';
        }

        function showJudgmentEffect(type) {
            judgmentDisplay.innerHTML = ''; 
            const txt = document.createElement('div');
            txt.className = `judgment-text ${type.toLowerCase()}`;
            txt.textContent = type;
            if (combo >= 2) {
                const comboTxt = document.createElement('div');
                comboTxt.className = 'combo-text';
                comboTxt.textContent = `${combo} COMBO`;
                txt.appendChild(comboTxt);
            }
            judgmentDisplay.appendChild(txt);
            setTimeout(() => { if (judgmentDisplay.firstChild === txt) judgmentDisplay.innerHTML = ''; }, 500);
        }

        function handleKeyDown(keyId) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const targetKey = document.getElementById(keyId);
            if (!targetKey || targetKey.classList.contains('active')) return;

            targetKey.classList.add('active');

            if (currentSongId !== 'free') {
                const matchingNoteIndex = activeNotes.findIndex(n => n.keyId === keyId);
                
                if (matchingNoteIndex !== -1) {
                    const noteObj = activeNotes[matchingNoteIndex];
                    const rect = noteObj.element.getBoundingClientRect();
                    const viewRect = gameView.getBoundingClientRect();
                    
                    const noteBottomInsideView = rect.bottom - viewRect.top;
                    const targetLinePos = viewRect.height - 15; // 判定線位置（15px）に同期
                    const diff = Math.abs(noteBottomInsideView - targetLinePos);

                    if (diff <= 45) { 
                        playHitSound(); 
                        playTone(parseFloat(targetKey.getAttribute('data-note'))); 
                        
                        if (diff <= 15) {
                            score += 100; combo++; showJudgmentEffect('PERFECT');
                        } else {
                            score += 50; combo++; showJudgmentEffect('GREAT');
                        }
                        
                        scoreDisplay.textContent = `SCORE: ${score}`;
                        comboDisplay.textContent = `${combo} COMBO`;
                        comboDisplay.style.opacity = '1';

                        noteObj.element.remove(); 
                        activeNotes.splice(matchingNoteIndex, 1);
                        return;
                    }
                }
                
                combo = 0;
                comboDisplay.style.opacity = '0';
                showJudgmentEffect('MISS');
                playMissSound(); 
            } else {
                playTone(parseFloat(targetKey.getAttribute('data-note')));
            }
        }

        function handleKeyUp(keyId) {
            const targetKey = document.getElementById(keyId);
            if (targetKey) targetKey.classList.remove('active');
        }

        const pressedKeys = {};
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && currentSongId !== 'free' && !startBtn.disabled) { startPlaying(); return; }
            const keyId = `key-${e.key.toUpperCase()}`;
            if (pressedKeys[e.key.toUpperCase()] || !allKeyIds.includes(keyId)) return;
            pressedKeys[e.key.toUpperCase()] = true;
            handleKeyDown(keyId);
        });
        window.addEventListener('keyup', (e) => {
            pressedKeys[e.key.toUpperCase()] = false;
            handleKeyUp(`key-${e.key.toUpperCase()}`);
        });

        document.querySelectorAll('.white-key, .black-key').forEach(key => {
            key.addEventListener('touchstart', (e) => { e.preventDefault(); handleKeyDown(key.id); }, {passive: false});
            key.addEventListener('touchend', (e) => { e.preventDefault(); handleKeyUp(key.id); }, {passive: false});
            key.addEventListener('mousedown', () => handleKeyDown(key.id));
            key.addEventListener('mouseup', () => handleKeyUp(key.id));
            key.addEventListener('mouseleave', () => handleKeyUp(key.id));
        });

        startBtn.addEventListener('click', startPlaying);

        function startPlaying() {
            if (!currentSong || currentSong.data.length === 0) return;
            startBtn.disabled = true;
            startBtn.textContent = "演奏中...";
            
            score = 0; combo = 0;
            scoreDisplay.textContent = "SCORE: 0";
            comboDisplay.style.opacity = '0';
            progressBar.style.width = '0%';
            
            const lastNote = currentSong.data[currentSong.data.length - 1];
            const totalGameTime = (lastNote[1] + 2.5) * 1000; 

            const startTime = Date.now();
            progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const pct = Math.min((elapsed / totalGameTime) * 100, 100);
                progressBar.style.width = `${pct}%`;
            }, 50);

            currentSong.data.forEach(([keyId, delay]) => {
                setTimeout(() => { createNoteBlock(keyId); }, delay * 1000);
            });

            setTimeout(() => {
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                startBtn.disabled = false;
                startBtn.textContent = "再挑戦！";
            }, totalGameTime);
        }

        function createNoteBlock(keyId) {
            if (keyId === 'key-0') return;

            const block = document.createElement('div');
            block.classList.add('note-block');
            
            const keyEl = document.getElementById(keyId);
            const isBlack = keyEl.getAttribute('data-is-black') === 'true';
            const index = parseFloat(keyEl.getAttribute('data-index'));

            if (isBlack) {
                block.classList.add('black-note');
                block.style.width = `calc(12.5% * 0.65)`;
                block.style.left = `calc(${index * 12.5}% + 1px)`;
                block.style.zIndex = "3";
            } else {
                block.style.width = `calc(12.5% - 2px)`;
                block.style.left = `calc(${index * 12.5}% + 1px)`;
            }
            
            gameView.appendChild(block);

            const noteObj = { keyId: keyId, element: block };
            activeNotes.push(noteObj);

            block.addEventListener('animationend', () => {
                block.remove();
                if (activeNotes.includes(noteObj)) {
                    combo = 0;
                    comboDisplay.style.opacity = '0';
                    showJudgmentEffect('MISS');
                    activeNotes = activeNotes.filter(n => n !== noteObj);
                }
            });
        }

        function playTone(frequency) {
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain(); osc1.type = 'sine'; osc1.frequency.value = frequency;
            const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain(); osc2.type = 'triangle'; osc2.frequency.value = frequency * 2;
            const osc3 = audioCtx.createOscillator(); const gain3 = audioCtx.createGain(); osc3.type = 'sawtooth'; osc3.frequency.value = frequency * 3;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(frequency * 4, now); filter.frequency.exponentialRampToValueAtTime(frequency * 1.5, now + 0.8);
            gain1.gain.setValueAtTime(0, now); gain1.gain.linearRampToValueAtTime(0.6, now + 0.005); gain1.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
            gain2.gain.setValueAtTime(0, now); gain2.gain.linearRampToValueAtTime(0.2, now + 0.005); gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            gain3.gain.setValueAtTime(0, now); gain3.gain.linearRampToValueAtTime(0.05, now + 0.002); gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc1.connect(gain1); gain1.connect(filter); osc2.connect(gain2); gain2.connect(filter); osc3.connect(gain3); gain3.connect(filter);
            filter.connect(audioCtx.destination);
            osc1.start(now); osc1.stop(now + 1.2); osc2.start(now); osc2.stop(now + 0.5); osc3.start(now); osc3.stop(now + 0.1);
        }

        function playHitSound() {
            const bufferSize = audioCtx.sampleRate * 0.04; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 1500;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
        }

        function playMissSound() {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sawtooth'; osc.frequency.value = 110; const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.15); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.15);
        }
    </script>
</body>
</html>
