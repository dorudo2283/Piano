<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>リズムWebピアノ</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        
        /* 曲選択エリア */
        .song-selector { margin: 20px; z-index: 10; }
        .btn { padding: 10px 20px; font-size: 16px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #555; cursor: not-allowed; }

        /* ゲーム画面全体のコンテナ */
        .game-view { position: relative; width: 480px; height: 500px; background: #222; border: 3px solid #444; border-bottom: none; overflow: hidden; }

        /* 上から降ってくるノーツ（ブロック） */
        .note-block {
            position: absolute; width: 55px; height: 30px;
            background: linear-gradient(#00d2ff, #0066ff);
            border-radius: 5px; box-shadow: 0 0 10px #00d2ff;
            /* CSSアニメーションで上から下へ落とす */
            animation: fall 2.5s linear forwards;
        }

        /* 判定ライン（鍵盤のすぐ上） */
        .judgment-line { position: absolute; bottom: 120px; width: 100%; height: 2px; background: #ff0055; box-shadow: 0 0 8px #ff0055; z-index: 2; }

        /* ピアノの鍵盤エリア */
        .piano-container { display: flex; gap: 5px; background: #333; padding: 10px; width: 460px; height: 120px; position: absolute; bottom: 0; z-index: 3; }
        .white-key {
            width: 55px; height: 100%; background: white; color: #333; cursor: pointer; border-radius: 0 0 5px 5px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 10px; font-weight: bold; user-select: none; box-shadow: inset 0 -5px 0 #ccc;
        }
        .white-key.active, .white-key:active { background: #00d2ff; color: white; box-shadow: none; transform: scaleY(0.96); transform-origin: top; }
        .key-hint { font-size: 11px; color: #888; }

        /* 落ちてくるアニメーションの設定 */
        @keyframes fall {
            0% { top: -40px; }
            100% { top: 500px; } /* 画面外に消える */
        }
    </style>
</head>
<body>

    <div class="song-selector">
        <button id="start-btn" class="btn">🎵 『きらきら星』を演奏スタート！</button>
    </div>

    <div class="game-view" id="game-view">
        <div class="judgment-line"></div>
        
        <div class="piano-container">
            <div class="white-key" id="key-A" data-note="261.63"><span>ド</span><span class="key-hint">[A]</span></div>
            <div class="white-key" id="key-S" data-note="293.66"><span>レ</span><span class="key-hint">[S]</span></div>
            <div class="white-key" id="key-D" data-note="329.63"><span>ミ</span><span class="key-hint">[D]</span></div>
            <div class="white-key" id="key-F" data-note="349.23"><span>ファ</span><span class="key-hint">[F]</span></div>
            <div class="white-key" id="key-G" data-note="392.00"><span>ソ</span><span class="key-hint">[G]</span></div>
            <div class="white-key" id="key-H" data-note="440.00"><span>ラ</span><span class="key-hint">[H]</span></div>
            <div class="white-key" id="key-J" data-note="493.88"><span>シ</span><span class="key-hint">[J]</span></div>
            <div class="white-key" id="key-K" data-note="523.25"><span>ド↑</span><span class="key-hint">[K]</span></div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gameView = document.getElementById('game-view');
        const startBtn = document.getElementById('start-btn');

        // 各鍵盤の左端からの位置（px）をマッピング（ブロックを正しい列に落とすため）
        const keyPositions = { 'key-A': 10, 'key-S': 70, 'key-D': 130, 'key-F': 190, 'key-G': 250, 'key-H': 310, 'key-J': 370, 'key-K': 430 };
        const keys = document.querySelectorAll('.white-key');

        // 楽譜データ：[鍵盤ID, 降らせるタイミング（秒）]
        const songData = [
            ['key-A', 0.0], ['key-A', 1.0], ['key-G', 2.0], ['key-G', 3.0],
            ['key-H', 4.0], ['key-H', 5.0], ['key-G', 6.0],
            ['key-F', 8.0], ['key-F', 9.0], ['key-D', 10.0], ['key-D', 11.0],
            ['key-S', 12.0], ['key-S', 13.0], ['key-A', 14.0]
        ];

        // 1. ユーザー入力の処理（キーボード ＆ クリック）
        const pressedKeys = {};
        
        function handleKeyDown(keyId) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const targetKey = document.getElementById(keyId);
            if (targetKey) {
                targetKey.classList.add('active');
                const freq = parseFloat(targetKey.getAttribute('data-note'));
                playTone(freq);
            }
        }

        function handleKeyUp(keyId) {
            const targetKey = document.getElementById(keyId);
            if (targetKey) targetKey.classList.remove('active');
        }

        // PCキーボード
        window.addEventListener('keydown', (e) => {
            const keyName = e.key.toUpperCase();
            const keyId = `key-${keyName}`;
            if (pressedKeys[keyName] || !keyPositions[keyId]) return;
            pressedKeys[keyName] = true;
            handleKeyDown(keyId);
        });
        window.addEventListener('keyup', (e) => {
            const keyName = e.key.toUpperCase();
            pressedKeys[keyName] = false;
            handleKeyUp(`key-${keyName}`);
        });

        // マウスクリック
        keys.forEach(key => {
            key.addEventListener('mousedown', () => handleKeyDown(key.id));
            key.addEventListener('mouseup', () => handleKeyUp(key.id));
            key.addEventListener('mouseleave', () => handleKeyUp(key.id));
        });

        // 2. 【新機能】ブロック（ノーツ）を降らせるロジック
        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            
            songData.forEach(([keyId, delay]) => {
                // 指定された秒数後にブロックを画面に追加する
                setTimeout(() => {
                    createNoteBlock(keyId);
                }, delay * 1000);
            });

            // 曲が終わったらボタンを再活性（18秒後）
            setTimeout(() => { startBtn.disabled = false; }, 18000);
        });

        function createNoteBlock(keyId) {
            const block = document.createElement('div');
            block.classList.add('note-block');
            
            // 対応する鍵盤の真上に位置を合わせる
            block.style.left = `${keyPositions[keyId]}px`;
            
            gameView.appendChild(block);

            // アニメーション終了（2.5秒で画面外へ）したら要素を削除して重くならないようにする
            block.addEventListener('animationend', () => {
                block.remove();
            });
        }

        // 音を鳴らす関数
        function playTone(frequency) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'triangle';
            oscillator.frequency.value = frequency;

            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0.8, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start(now);
            oscillator.stop(now + 0.8);
        }
    </script>
</body>
</html>
